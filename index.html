<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mauve Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 { margin-bottom: 1rem; }
    .drop-zone {
      width: 960px;
      min-height: 200px;
      border: 2px dashed #aaa;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1rem;
    }
    .drop-zone.dragover {
      border-color: #4a90d9;
      background: #e8f0fe;
    }
    .drop-zone p { color: #888; font-size: 1.1rem; }
    #viewer { margin-top: 1rem; }
    .genome-label { font-size: 12px; font-weight: 600; }
    .ruler text { font-size: 10px; }
    .navigation-toolbar {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: fit-content;
      margin-bottom: 8px;
    }
    .navigation-toolbar button {
      width: 32px;
      height: 32px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .navigation-toolbar button:hover {
      background: #e0e0e0;
      border-color: #999;
    }
    .navigation-toolbar button:active {
      background: #d0d0d0;
    }
    .track-controls {
      width: 30px;
    }
    .track-control-group button {
      width: 24px;
      height: 22px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s;
    }
    .track-control-group button:hover {
      background: #e0e0e0;
    }
    .track-control-group button:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .track-control-group button.active {
      background: #4a90d9;
      color: #fff;
      border-color: #3a7bc8;
    }
  </style>
</head>
<body>
  <h1>Mauve Genome Alignment Viewer</h1>
  <div class="drop-zone" id="dropZone">
    <p>Drop an XMFA alignment file here, or click to select</p>
    <input type="file" id="fileInput" accept=".xmfa,.alignment" hidden />
  </div>
  <div id="viewer"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
