<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mauve Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 { margin-bottom: 1rem; }
    .drop-zone {
      width: 960px;
      min-height: 200px;
      border: 2px dashed #aaa;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1rem;
    }
    .drop-zone.dragover {
      border-color: #4a90d9;
      background: #e8f0fe;
    }
    .drop-zone p { color: #888; font-size: 1.1rem; }
    #viewer { margin-top: 1rem; }
    .viewer-controls-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .genome-label { font-family: sans-serif; font-size: 10px; fill: #888; }
    .ruler text { font-size: 10px; }
    .navigation-toolbar {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: fit-content;
    }
    .navigation-toolbar button {
      width: 32px;
      height: 32px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .navigation-toolbar button:hover {
      background: #e0e0e0;
      border-color: #999;
    }
    .navigation-toolbar button:active {
      background: #d0d0d0;
    }
    .track-controls {
      width: 30px;
    }
    .track-control-group button {
      width: 24px;
      height: 22px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s;
    }
    .track-control-group button:hover {
      background: #e0e0e0;
    }
    .track-control-group button:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .track-control-group button.active {
      background: #4a90d9;
      color: #fff;
      border-color: #3a7bc8;
    }
    .options-panel {
      display: inline-block;
      position: relative;
      margin-left: 8px;
      vertical-align: middle;
    }
    .options-toggle {
      height: 32px;
      padding: 0 12px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .options-toggle:hover {
      background: #e0e0e0;
      border-color: #999;
    }
    .options-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 100;
      min-width: 200px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      padding: 6px 0;
      margin-top: 2px;
    }
    .options-dropdown.show {
      display: block;
    }
    .options-item {
      padding: 4px 12px;
    }
    .options-item label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .options-item input[type="checkbox"] {
      margin: 0;
    }
    .options-separator {
      margin: 4px 0;
      border: none;
      border-top: 1px solid #ddd;
    }
    .options-action-btn {
      display: block;
      width: 100%;
      padding: 6px 12px;
      border: none;
      background: none;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      color: #333;
    }
    .options-action-btn:hover {
      background: #e8f0fe;
    }
    .export-menu {
      display: inline-block;
      position: relative;
      margin-left: 8px;
      vertical-align: middle;
    }
    .export-menu-toggle {
      height: 32px;
      padding: 0 12px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .export-menu-toggle:hover {
      background: #e0e0e0;
      border-color: #999;
    }
    .export-menu-toggle:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .export-menu-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      z-index: 100;
      min-width: 220px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      padding: 6px 0;
      margin-top: 2px;
    }
    .export-menu-dropdown.show {
      display: block;
    }
    .export-menu-action-btn {
      display: block;
      width: 100%;
      padding: 6px 12px;
      border: none;
      background: none;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      color: #333;
    }
    .export-menu-action-btn:hover {
      background: #e8f0fe;
    }
    .color-scheme-menu {
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
    }
    .color-scheme-label {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .color-scheme-select {
      height: 28px;
      padding: 0 6px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .color-scheme-select:hover {
      border-color: #999;
    }
    /* Image export dialog */
    .image-export-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
    }
    .image-export-dialog {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1001;
    }
    .export-dialog-content {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      min-width: 320px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .export-dialog-content h3 {
      margin: 0 0 16px;
      font-size: 18px;
    }
    .export-field {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .export-field label {
      min-width: 80px;
      font-size: 13px;
    }
    .export-field input, .export-field select {
      flex: 1;
      height: 30px;
      padding: 0 8px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 13px;
    }
    .export-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
    .export-actions button {
      height: 32px;
      padding: 0 16px;
      border: 1px solid #bbb;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .export-cancel-btn { background: #f5f5f5; }
    .export-confirm-btn { background: #4a90d9; color: #fff; border-color: #3a7bc8; }
    .export-confirm-btn:hover { background: #3a7bc8; }
    /* Summary export modal (<dialog>) */
    .summary-export-modal {
      border: none;
      border-radius: 8px;
      padding: 0;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .summary-export-modal::backdrop {
      background: rgba(0,0,0,0.4);
    }
    .summary-export-modal .export-dialog-content {
      box-shadow: none;
    }
    .summary-export-modal a.export-confirm-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 16px;
      border-radius: 4px;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }
    /* Sequence navigator */
    .sequence-navigator {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1001;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      min-width: 420px;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .seq-nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
    }
    .seq-nav-header h3 { margin: 0; font-size: 16px; }
    .seq-nav-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #888;
      line-height: 1;
    }
    .seq-nav-tabs {
      display: flex;
      border-bottom: 1px solid #eee;
    }
    .seq-nav-tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .seq-nav-tab.active {
      background: #fff;
      font-weight: 600;
      border-bottom: 2px solid #4a90d9;
    }
    .seq-nav-panel {
      padding: 12px 16px;
    }
    .seq-nav-field { margin-bottom: 8px; }
    .seq-nav-field input, .seq-nav-field select {
      width: 100%;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 13px;
    }
    .seq-nav-options {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .seq-nav-options select {
      flex: 1;
      height: 30px;
      padding: 0 6px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 13px;
    }
    .seq-nav-search-btn, .seq-nav-goto-btn {
      width: 100%;
      height: 32px;
      border: 1px solid #3a7bc8;
      border-radius: 4px;
      background: #4a90d9;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .seq-nav-search-btn:hover, .seq-nav-goto-btn:hover {
      background: #3a7bc8;
    }
    .seq-nav-results {
      max-height: 300px;
      overflow-y: auto;
    }
    .seq-nav-result {
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.1s;
    }
    .seq-nav-result:hover {
      background: #e8f0fe;
    }
    .seq-nav-result-header {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 2px;
    }
    .seq-nav-result-type {
      background: #eee;
      padding: 1px 4px;
      border-radius: 2px;
    }
    .seq-nav-result-info {
      font-size: 13px;
      margin-bottom: 2px;
    }
    .seq-nav-result-coords {
      font-size: 11px;
      color: #666;
      font-family: monospace;
    }
    .seq-nav-no-results {
      padding: 16px;
      text-align: center;
      color: #888;
      font-size: 13px;
    }
    .seq-nav-more {
      padding: 8px;
      text-align: center;
      color: #888;
      font-size: 12px;
    }
    /* Keyboard shortcuts help */
    .shortcuts-help-wrapper {
      display: inline-block;
      position: relative;
      margin-left: 8px;
      vertical-align: middle;
    }
    .shortcuts-help-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #bbb;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      color: #666;
    }
    .shortcuts-help-btn:hover {
      background: #e0e0e0;
      border-color: #999;
    }
    .shortcuts-help-box {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      z-index: 100;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      padding: 12px 16px;
      margin-top: 4px;
      min-width: 280px;
    }
    .shortcuts-help-box.show {
      display: block;
    }
    .shortcuts-help-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #eee;
    }
    .shortcuts-help-list {
      margin: 0;
    }
    .shortcuts-help-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0;
      gap: 16px;
    }
    .shortcuts-help-row dt {
      white-space: nowrap;
    }
    .shortcuts-help-row dd {
      margin: 0;
      font-size: 13px;
      color: #555;
      text-align: right;
    }
    .shortcuts-help-row kbd {
      display: inline-block;
      padding: 2px 6px;
      font-size: 11px;
      font-family: system-ui, sans-serif;
      background: #f3f3f3;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-shadow: 0 1px 0 #bbb;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Mauve Genome Alignment Viewer</h1>
  <div class="drop-zone" id="dropZone">
    <p>Drop files here, or click to select (XMFA, JSON, Mauve, GenBank, EMBL, INSDseq XML)</p>
    <input type="file" id="fileInput" accept=".xmfa,.alignment,.json,.mauve,.mln,.gbk,.gb,.genbank,.embl,.dat,.xml,.insdc" multiple hidden />
  </div>
  <div id="viewer"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
